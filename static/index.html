<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Temperature Predictor</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    label { display:block; margin-bottom: .5rem }
    input { padding: .5rem; width: 6rem }
    button { padding: .5rem 1rem; margin-left: .5rem }
    #result { margin-top: 1rem; font-weight: bold }
  </style>
</head>
<body>
  <h1>Temperature Predictor (Humidity → Temperature)</h1>
  <label>
    Humidity:
    <input id="humidity" type="number" value="50" step="0.1" />
    <button id="predict">Predict</button>
  </label>
  <div id="result">Enter a humidity and click Predict.</div>

  <script>
    const btn = document.getElementById('predict');
    const input = document.getElementById('humidity');
    const result = document.getElementById('result');

    btn.addEventListener('click', async () => {
      const h = parseFloat(input.value);
      result.textContent = 'Predicting...';
      try {
        const resp = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ humidity: h })
        });
        const data = await resp.json();
        if (data.error) {
          result.textContent = 'Error: ' + data.error;
        } else {
          result.textContent = `Predicted temperature: ${data.predicted_temperature.toFixed(4)} °C`;
        }
      } catch (err) {
        result.textContent = 'Request failed: ' + err;
      }
    });
  </script>
</body>
</html>
